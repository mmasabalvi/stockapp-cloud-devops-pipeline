---
- name: Configure EC2 as a single-node Kubernetes host
  hosts: k8s_host
  become: true

  vars:
    kind_version: "v0.27.0"
    kubectl_version: "v1.32.0"
    cluster_name: "stockapp-cluster"

  tasks:
    - name: Update apt package index
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - apt-transport-https
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: true

    - name: Download kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: Download kind
      get_url:
        url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: "0755"

    - name: Check if kind cluster already exists
      command: kind get clusters
      register: kind_clusters
      changed_when: false

    - name: Create kind cluster
      command: kind create cluster --name {{ cluster_name }}
      when: cluster_name not in kind_clusters.stdout_lines

    - name: Create .kube directory for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"

    - name: Copy kubeconfig to ubuntu user
      copy:
        src: /root/.kube/config
        dest: /home/ubuntu/.kube/config
        remote_src: true
        owner: ubuntu
        group: ubuntu
        mode: "0600"

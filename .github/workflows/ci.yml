name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build, push, and update manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Build and push database image
        uses: docker/build-push-action@v6
        with:
          context: ./database
          file: ./database/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/database:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/database:latest

      - name: Update Kubernetes manifests with new image tag
        run: |
          sed -i "s|image: .*/backend:.*|image: ${DOCKERHUB_USER}/backend:${IMAGE_TAG}|g" k8s/backend-deployment.yml
          sed -i "s|image: .*/frontend:.*|image: ${DOCKERHUB_USER}/frontend:${IMAGE_TAG}|g" k8s/frontend-deployment.yml
          sed -i "s|image: .*/database:.*|image: ${DOCKERHUB_USER}/database:${IMAGE_TAG}|g" k8s/database-deployment.yml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/backend-deployment.yml k8s/frontend-deployment.yml k8s/database-deployment.yml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "Update Kubernetes image tags to ${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
